<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relecture trajet GPS train</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
  :root {
    --bg: #1a1d23;
    --panel: #262a33;
    --accent: #ff7900; /* Orange signalisation */
    --text: #ffffff;
    --muted: #a0aab8;
    --line: #3d4452;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }

  header {
    padding: 30px 20px;
    background: linear-gradient(to bottom, #11141a, var(--bg));
    border-bottom: 4px solid var(--accent);
    text-align: center;
  }

  h1 { margin: 0; letter-spacing: 1px; text-transform: uppercase; font-size: 24px; }

  main {
    max-width: 1200px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 20px;
    padding: 0 20px;
  }

  .panel, .mapWrap {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 250px;
    background: #0f1115;
    color: #ddd;
    border: 1px solid var(--line);
    padding: 12px;
    border-radius: 2px;
    font-family: monospace;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 15px;
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    font-size: 12px;
  }

  button:hover { filter: brightness(1.2); }
  button.secondary { background: #4a5468; }
  button.danger { background: #8c2a2a; }

  #map { height: 500px; width: 100%; border: 2px solid var(--line); }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  .stat { background: #1a1d23; padding: 10px; border-left: 3px solid var(--accent); }
  .stat .n { font-weight: bold; font-size: 18px; color: var(--accent); }
  .stat .t { font-size: 11px; text-transform: uppercase; color: var(--muted); }

  @media(max-width:920px) {
    main { grid-template-columns: 1fr; }
    #map { height: 350px; }
  }
</style>
</head>
<body>

<header>
  <h1>Relecture GPS Train</h1>
</header>

<main>
  <section class="panel">
    <label>Données du trajet</label>
    <textarea id="input" placeholder="Collez vos points ici..."></textarea>
    <div class="buttons">
      <button onclick="generateMap()">Analyser</button>
      <button class="secondary" id="playBtn" onclick="togglePlay()" disabled>Lecture</button>
      <button class="secondary" onclick="clearAll()">Réinitialiser</button>
    </div>
    
    <div class="stat-grid">
      <div class="stat"><div class="n" id="count">0</div><div class="t">Points</div></div>
      <div class="stat"><div class="n" id="distance">0 m</div><div class="t">Distance</div></div>
    </div>
    <div id="message" style="margin-top:15px; font-size: 13px;"></div>
  </section>

  <section class="mapWrap">
    <div id="map"></div>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let map, routeLayer, markersLayer, currentPoints = [];

  function initMap(){
    map = L.map('map').setView([46.7, 2.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    routeLayer = L.layerGroup().addTo(map);
    markersLayer = L.layerGroup().addTo(map);
  }

  // --- Fonctions simplifiées pour l'exemple ---
  function generateMap() {
    const text = document.getElementById('input').value;
    // Logique simplifiée de parsing
    const lines = text.split('\n');
    alert("Analyse en cours... (Intégrez votre logique de parsing ici)");
    document.getElementById('playBtn').disabled = false;
  }

  function togglePlay() { alert("Lecture du trajet..."); }
  function clearAll() { 
    document.getElementById('input').value = ''; 
    document.getElementById('count').textContent = '0';
  }

  window.onload = initMap;
</script>
</body>
</html>
